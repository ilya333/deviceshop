<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeviceShop — Товар</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Кастомный скроллбар */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #d4a574, #c0c5c8); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #c49464, #b0b5b8); }
    * { scrollbar-width: auto; scrollbar-color: #d4a574 rgba(0, 0, 0, 0.2); }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('../Jpg/ФОН.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
    }
    
    :root {
      --primary: #d4a574;
      --secondary: #c0c5c8;
      --accent: #e8d5c0;
      --danger: #e8a090;
      --card: rgba(30, 28, 25, 0.85);
      --border: rgba(255,255,255,0.1);
      --radius: 20px;
      --shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
    }
    
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    a { color: inherit; text-decoration: none; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      border: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #1a1a1a; box-shadow: 0 4px 14px rgba(212,165,116,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,165,116,0.4); }
    .btn-outline { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; }
    .btn-outline:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    
    .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    
    /* Стили для кнопки входа */
    .auth-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: #d0cdc8;
      transition: 0.2s;
    }
    .auth-btn:hover {
      background: rgba(255,255,255,0.2);
      color: var(--primary);
      transform: translateY(-2px);
    }
    
    /* Модальное окно для входа/регистрации */
    .auth-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-modal.open { display: flex; }
    .auth-modal-content {
      max-width: 450px;
      width: 100%;
      background: rgba(30, 28, 25, 0.95);
      border-radius: 28px;
      border: 1px solid var(--border);
      animation: modalFadeIn 0.3s ease;
    }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .auth-modal-header { padding: 24px 24px 0; display: flex; justify-content: space-between; align-items: center; }
    .auth-modal-header h3 { font-size: 24px; font-weight: 700; }
    .auth-close { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 30px; cursor: pointer; font-size: 20px; transition: 0.2s; }
    .auth-close:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
    .auth-tabs { display: flex; gap: 16px; padding: 20px 24px 0; border-bottom: 1px solid var(--border); }
    .auth-tab { padding: 12px 0; font-weight: 600; cursor: pointer; color: #d0cdc8; border-bottom: 2px solid transparent; }
    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .auth-form { padding: 24px; }
    .auth-form input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 16px; }
    .auth-form input:focus { outline: none; border-color: var(--primary); }
    .auth-submit { width: 100%; margin-top: 8px; }
    
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(20, 18, 16, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; flex-wrap: wrap; gap: 20px; }
    .logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 800; }
    .logo-mark { width: 50px; height: 50px; border-radius: 12px; overflow: hidden; }
    .logo-mark img { width: 100%; height: 100%; object-fit: cover; }
    .nav-links { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
    .nav-links a { color: #d0cdc8; transition: 0.2s; }
    .nav-links a:hover { color: var(--primary); }
    .cart-button { position: relative; }
    .cart-count { position: absolute; top: -8px; right: -8px; background: var(--danger); color: #1a1a1a; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 30px; min-width: 20px; text-align: center; }
    
    .section { padding: 56px 0; }
    .breadcrumbs { color: #d0cdc8; font-size: 14px; margin-bottom: 24px; }
    .breadcrumbs a { color: var(--primary); }
    .breadcrumbs a:hover { text-decoration: underline; }
    
    .product-layout { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(320px, 1fr); gap: 40px; align-items: start; }
    .product-gallery { padding: 24px; }
    .product-main-image { height: 480px; border-radius: 18px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
    .product-main-image img { width: 100%; height: 100%; object-fit: cover; }
    
    .product-info { padding: 32px; }
    .product-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; color: #d0cdc8; font-size: 14px; }
    .pill { padding: 6px 12px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.04); }
    .product-title { font-size: clamp(32px, 5vw, 52px); line-height: 1.05; margin-bottom: 16px; }
    .rating { color: #ffd86b; font-size: 18px; margin-bottom: 16px; }
    .description { color: #d0cdc8; margin: 18px 0 24px; font-size: 16px; line-height: 1.6; }
    .price { font-size: 36px; font-weight: 900; margin: 20px 0; color: var(--primary); }
    
    .color-title { font-size: 14px; font-weight: 800; margin-bottom: 12px; color: #e8e8f0; }
    .color-list { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .color-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }
    .color-chip:hover { background: rgba(212,165,116,0.2); border-color: var(--primary); }
    .color-chip.active { border-color: var(--primary); background: rgba(212,165,116,0.2); box-shadow: 0 0 0 2px rgba(212,165,116,0.25); }
    .swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35); display: inline-block; }
    
    .actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 22px; }
    .actions .btn { flex: 1 1 180px; }
    
    .specs { margin-top: 28px; padding: 22px; }
    .specs h3, .related-title { margin-bottom: 18px; font-size: 24px; color: #fff; }
    .spec-item { display: flex; justify-content: space-between; gap: 18px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .spec-item:last-child { border-bottom: none; }
    .spec-label { color: #d0cdc8; }
    .spec-value { color: #fff; font-weight: 700; text-align: right; }
    
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 32px; }
    .related-card { padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .related-card:hover { transform: translateY(-4px); box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6); }
    .related-image { height: 180px; border-radius: 16px; overflow: hidden; background: #111; }
    .related-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
    .related-card:hover .related-image img { transform: scale(1.05); }
    .related-card h3 { font-size: 18px; font-weight: 700; }
    .related-card .btn { width: 100%; }
    
    .notice { padding: 60px; text-align: center; }
    .notice .btn { margin-top: 20px; width: auto; display: inline-flex; }
    
    footer { border-top: 1px solid var(--border); padding: 32px 0; margin-top: 40px; color: #d0cdc8; font-size: 14px; }
    
    @media (max-width: 900px) {
      .product-layout, .related-grid { grid-template-columns: 1fr; }
      .product-main-image { height: 340px; }
      .nav { flex-direction: column; align-items: stretch; text-align: center; }
      .nav-links { justify-content: center; }
    }
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <a href="index.html" class="logo">
      <span class="logo-mark"><img src="../Jpg/ыыччч.jpg" alt="DeviceShop" onerror="this.src='https://via.placeholder.com/50x50?text=DS'"></span>
      <span>DeviceShop</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Главная</a>
      <a href="catalog.html">Каталог</a>
      <a href="cart.html">Корзина</a>
      <a href="index.html#contacts">Контакты</a>
      <a href="#" class="btn auth-btn" id="openAuthBtn">Вход / Регистрация</a>
    </div>
    <a href="cart.html" class="btn btn-primary cart-button">Корзина <span class="cart-count" id="cartCount">0</span></a>
  </div>
</header>

<main class="section">
  <div class="container">
    <div class="breadcrumbs"><a href="catalog.html">Каталог</a> / <span id="breadcrumbName">Товар</span></div>
    <div id="productRoot"></div>
  </div>
</main>

<footer>
  <div class="container" style="display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;">
    <p>© 2026 DeviceShop — магазин периферии для настоящих геймеров</p>
    <p>Все права защищены</p>
  </div>
</footer>

<!-- Модальное окно для входа/регистрации -->
<div id="authModal" class="auth-modal">
  <div class="auth-modal-content">
    <div class="auth-modal-header">
      <h3>Добро пожаловать</h3>
      <button class="auth-close" id="closeAuthBtn">✕</button>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Вход</div>
      <div class="auth-tab" data-tab="register">Регистрация</div>
    </div>
    
    <div id="loginForm" class="auth-form">
      <input type="email" placeholder="Email" id="loginEmail">
      <input type="password" placeholder="Пароль" id="loginPassword">
      <button class="btn btn-primary auth-submit" onclick="handleLogin()">Войти</button>
    </div>
    
    <div id="registerForm" class="auth-form" style="display: none;">
      <input type="text" placeholder="Имя" id="regName">
      <input type="email" placeholder="Email" id="regEmail">
      <input type="password" placeholder="Пароль" id="regPassword">
      <input type="password" placeholder="Подтвердите пароль" id="regConfirmPassword">
      <button class="btn btn-primary auth-submit" onclick="handleRegister()">Зарегистрироваться</button>
    </div>
  </div>
</div>

<script src="../js/products.js"></script>
<script>
  // === АВТОРИЗАЦИЯ ===
  const authModal = document.getElementById('authModal');
  const openAuthBtn = document.getElementById('openAuthBtn');
  const closeAuthBtn = document.getElementById('closeAuthBtn');
  
  function openAuthModal() { authModal.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeAuthModal() { authModal.classList.remove('open'); document.body.style.overflow = ''; }
  
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      const tabName = this.dataset.tab;
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      if (tabName === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
      }
    });
  });
  
  window.handleLogin = function() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { alert('Заполните поля'); return; }
    alert(`Выполнен вход: ${email}`);
    closeAuthModal();
  };
  
  window.handleRegister = function() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    if (!name || !email || !password || !confirm) { alert('Заполните поля'); return; }
    if (password !== confirm) { alert('Пароли не совпадают'); return; }
    if (password.length < 6) { alert('Пароль минимум 6 символов'); return; }
    alert(`Регистрация выполнена! Добро пожаловать, ${name}!`);
    closeAuthModal();
  };
  
  openAuthBtn.addEventListener('click', (e) => { e.preventDefault(); openAuthModal(); });
  closeAuthBtn.addEventListener('click', closeAuthModal);
  authModal.addEventListener('click', (e) => { if (e.target === authModal) closeAuthModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && authModal.classList.contains('open')) closeAuthModal(); });
  
  // === ОСНОВНОЙ КОД ===
  const root = document.getElementById('productRoot');
  const params = new URLSearchParams(window.location.search);
  const product = getProductById(params.get('id'));
  let selectedColor = getDefaultColor(product);
  
  function escapeHtml(value) {
    if (!value) return '';
    return String(value).replace(/[&<>'"]/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#039;', '"': '&quot;'
    }[char]));
  }
  
  function formatPrice(price) { return formatDeviceShopPrice(price); }
  
  function renderStars(rating) {
    const full = Math.floor(rating);
    return '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full));
  }
  
  function updateCartBadge() {
    const badge = document.getElementById('cartCount');
    if (badge) badge.textContent = getCartCount();
  }
  
  function renderColorChips() {
    if (!product.colors || product.colors.length === 0) return '';
    return product.colors.map(color => `
      <button class="color-chip ${color === selectedColor ? 'active' : ''}" type="button" data-color="${escapeHtml(color)}">
        <span class="swatch" style="background:${getColorHex(color)}"></span>${getColorLabel(color)}
      </button>
    `).join('');
  }
  
  function renderSpecs() {
    const specs = product.specs || {};
    const rows = Object.entries(specs).map(([key, value]) => `
      <div class="spec-item"><span class="spec-label">📌 ${escapeHtml(key)}</span><span class="spec-value">${escapeHtml(value)}</span></div>
    `).join('');
    return `
      <div class="specs glass">
        <h3>📋 Характеристики</h3>
        <div class="spec-item"><span class="spec-label">📦 Категория</span><span class="spec-value">${escapeHtml(product.category)}</span></div>
        <div class="spec-item"><span class="spec-label">🏭 Бренд</span><span class="spec-value">${escapeHtml(product.brand)}</span></div>
        ${rows}
        <div class="spec-item"><span class="spec-label">✅ Гарантия</span><span class="spec-value">12 месяцев</span></div>
      </div>
    `;
  }
  
  function renderRelated() {
    const related = products
      .filter(item => item.category === product.category && item.id !== product.id)
      .sort((a, b) => b.popular - a.popular)
      .slice(0, 3);
    
    if (!related.length) return '';
    
    return `
      <section style="margin-top: 60px;">
        <h2 class="related-title">🔗 Похожие товары</h2>
        <div class="related-grid">
          ${related.map(item => `
            <div class="related-card glass">
              <a class="related-image" href="product.html?id=${item.id}"><img src="${getProductImage(item)}" alt="${escapeHtml(item.name)}" loading="lazy"></a>
              <p style="color:#d0cdc8;font-size:13px;">${escapeHtml(item.category)} · ⭐ ${item.rating}</p>
              <h3>${escapeHtml(item.name)}</h3>
              <strong style="font-size:22px; color:var(--primary);">${formatPrice(item.price)}</strong>
              <a href="product.html?id=${item.id}" class="btn btn-outline">Подробнее →</a>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }
  
  function renderProduct() {
    if (!product) return;
    document.title = `DeviceShop — ${product.name}`;
    document.getElementById('breadcrumbName').textContent = product.name;
    
    const hasColors = product.colors && product.colors.length > 0;
    
    root.innerHTML = `
      <div class="product-layout">
        <div class="product-gallery glass">
          <div class="product-main-image"><img id="mainProductImage" src="${getProductImage(product, selectedColor)}" alt="${escapeHtml(product.name)}"></div>
        </div>
        <div>
          <div class="product-info glass">
            <div class="product-meta">
              <span class="pill">📁 ${escapeHtml(product.category)}</span>
              <span class="pill">🏷️ ${escapeHtml(product.brand)}</span>
              ${product.isNew ? '<span class="pill">✨ Новинка</span>' : ''}
            </div>
            <h1 class="product-title">${escapeHtml(product.name)}</h1>
            <div class="rating">${renderStars(product.rating)} <span style="color:#d0cdc8">${product.rating} / 5</span></div>
            <p class="description">${escapeHtml(product.fullDescription || product.description || 'Высококачественное устройство для настоящих ценителей.')}</p>
            <div class="price">${formatPrice(product.price)}</div>
            ${hasColors ? `
              <div class="color-title">🎨 Цвет: <span id="selectedColorLabel">${getColorLabel(selectedColor)}</span></div>
              <div class="color-list" id="colorList">${renderColorChips()}</div>
            ` : ''}
            <div class="actions">
              <button class="btn btn-primary" id="addToCartBtn">🛒 Добавить в корзину</button>
              <a href="catalog.html" class="btn btn-outline">← Назад в каталог</a>
            </div>
          </div>
          ${renderSpecs()}
        </div>
      </div>
      ${renderRelated()}
    `;
    
    if (hasColors) {
      document.querySelectorAll('.color-chip').forEach(button => {
        button.addEventListener('click', () => {
          selectedColor = button.dataset.color;
          document.getElementById('mainProductImage').src = getProductImage(product, selectedColor);
          document.getElementById('selectedColorLabel').textContent = getColorLabel(selectedColor);
          // Обновляем активный класс
          document.querySelectorAll('.color-chip').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
        });
      });
    }
    
    const addBtn = document.getElementById('addToCartBtn');
    if (addBtn) {
      addBtn.addEventListener('click', () => {
        addToCartById(product.id, selectedColor);
        updateCartBadge();
        alert('✅ Добавлено в корзину');
      });
    }
  }
  
  if (!product) {
    root.innerHTML = `
      <div class="notice glass">
        <h1>😕 Товар не найден</h1>
        <p style="margin:12px 0 20px; color:#d0cdc8;">Возможно, товар был удален или ссылка неверна.</p>
        <a class="btn btn-primary" href="catalog.html">🛍️ Перейти в каталог</a>
      </div>
    `;
  } else {
    renderProduct();
  }
  updateCartBadge();
</script>
</body>
</html>
